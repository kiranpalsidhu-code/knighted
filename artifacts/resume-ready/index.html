    <!-- Domain router: redirect theknightedjobs.com visitors to the Knighted Jobs app -->
    <script>
      (function() {
        if (window.location.hostname === 'theknightedjobs.com' || window.location.hostname === 'www.theknightedjobs.com') {
          var dest = '/knighted-jobs' + window.location.pathname.replace(/^\/knighted-jobs/, '') + window.location.search + window.location.hash;
          window.location.replace(dest);
        }
      })();
